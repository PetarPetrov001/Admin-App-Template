# This file is a reference template — do not link it to a Shopify app.
# Run `npm run link-app` to create a new app that will generate a toml
# and configure based on these values.

client_id = "REPLACE_WITH_YOUR_CLIENT_ID"
name = "admin-app"
application_url = "https://your-tunnel-url.ngrok-free.dev"
embedded = false

[access_scopes]
# Edit scopes to match your needs, then run: shopify app deploy
scopes = "read_products, write_metaobject_definitions, write_metaobjects, write_content, write_online_store_pages, write_online_store_navigation, read_markets, read_locales"

[auth]
redirect_urls = [ "https://your-tunnel-url.ngrok-free.dev/auth/callback" ]

[webhooks]
api_version = "2025-07"
